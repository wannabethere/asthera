# Breakdown entities config: single source for generic context breakdown (non-MDL).
# MDL-specific entities stay in mdl_prompts. Edit this file to add doc types or stores;
# prompts use the rendered summary (~10-15 sentences).

# Optional: explicit summary sentences. If provided, these are used as-is (10-15 sentences).
# If empty/absent, the loader generates a summary from the entities section below.
summary:
  sentences:
    - "Doc types (taxonomy) are: playbook, procedure, policy, standard, framework, requirement, control, rule_reference, advisory, exception, guide, faq, documentation, product_docs."
    - "Doc kind to store/type comes from knowledge_assistant_mapping: policy/playbook/procedure/guide/faq/framework/requirement/advisory/documentation/product_docs map to domain_knowledge with type filter; standard/control map to compliance_controls; exception/vulnerability/rule_reference map to entities with type filter."
    - "domain_knowledge holds KB documents; filter by type (policy, playbook, procedure, framework, product, etc.)."
    - "compliance_controls holds control definitions; filter by framework (SOC2, HIPAA, ISO27001, GDPR, NIST 800-53, PCI-DSS)."
    - "entities holds policy/product/risk entities and extracted identifiers (CVE, Checkov rules, framework clauses); filter by type and extraction_type."
    - "evidence and fields hold policy/risk evidence and fields; filter by type and extraction_type."
    - "Policy documents use domain_knowledge (type=policy), policy_entities/evidence/fields use entities/evidence/fields with type=policy."
    - "Product docs use domain_knowledge (type=product) and entities (type=product) for key concepts; product_descriptions for product purpose/capabilities."
    - "context_definitions and contextual_edges hold graph relationships (unchanged); use edge_type, source_entity_type, target_entity_type."
    - "Operational extracts: playbooks and procedure_steps first; then mitigations, remediations, validations, evidence_templates, issue_taxonomy, risk_assessment_guidance where stored in domain_knowledge/entities with appropriate type."
    - "Section labels from extractions: requirement, control, evidence, procedure, playbook, mapping, definition, advisory, other."
    - "Domains (for context) include: iam, vulnerability_management, logging_monitoring, incident_response, secure_sdlc, data_protection, network_security, cloud_security, endpoint_security, third_party_risk, backup_recovery, change_management, governance."

# Structured entities: used when summary.sentences is empty to generate the block.
# Add new doc_types or store entries here when adding extractions.
entities:
  doc_types:
    - playbook
    - procedure
    - policy
    - standard
    - framework
    - requirement
    - control
    - rule_reference
    - advisory
    - exception
    - guide
    - faq
    - documentation
    - product_docs
  domains:
    - iam
    - vulnerability_management
    - logging_monitoring
    - incident_response
    - secure_sdlc
    - data_protection
    - network_security
    - cloud_security
    - endpoint_security
    - third_party_risk
    - backup_recovery
    - change_management
    - governance
  stores:
    domain_knowledge:
      description: "KB documents (policy, playbook, procedure, guide, faq, framework, requirement, advisory, documentation, product_docs); filter by type."
    compliance_controls:
      description: "Control definitions; filter by framework (SOC2, HIPAA, ISO27001, etc.)."
    entities:
      description: "Extracted entities (policy/product/risk, CVE, Checkov, framework clauses); filter by type, extraction_type."
    evidence:
      description: "Evidence types from policies/risk; filter by type, extraction_type."
    fields:
      description: "Fields from policies/risk; filter by type, extraction_type."
    context_definitions:
      description: "Context definitions; query by context_id, domain."
    contextual_edges:
      description: "Relationships; query by edge_type, source_entity_type, target_entity_type."
    control_context_profiles:
      description: "Control-context links; query by control_id, context_id."
  doc_type_to_store:
    policy:
      store: domain_knowledge
      metadata_type: policy
    playbook:
      store: domain_knowledge
      metadata_type: playbook
    procedure:
      store: domain_knowledge
      metadata_type: procedure
    framework:
      store: domain_knowledge
      metadata_type: framework
    requirement:
      store: domain_knowledge
      metadata_type: requirement
    guide:
      store: domain_knowledge
      metadata_type: guide
    faq:
      store: domain_knowledge
      metadata_type: faq
    advisory:
      store: domain_knowledge
      metadata_type: advisory
    documentation:
      store: domain_knowledge
      metadata_type: documentation
    product_docs:
      store: domain_knowledge
      metadata_type: product
    standard:
      store: compliance_controls
      metadata_type: standard
    control:
      store: compliance_controls
      metadata_type: control
    exception:
      store: entities
      metadata_type: exception
    rule_reference:
      store: entities
      metadata_type: rule_reference

# Entity-to-collection mapping: planner entity types -> retrievable collection (store name).
# Used by retrieval to resolve search_questions[].entity to the collection to query.
# Add new rows when adding entity types; collection must exist in CollectionFactory.all_collections.
entity_to_collection:
  # Policy
  policy_documents:
    collection: domain_knowledge
    default_metadata: { type: policy }
  policy_entities:
    collection: entities
    default_metadata: { type: policy }
  policy_evidence:
    collection: evidence
    default_metadata: { type: policy }
  policy_fields:
    collection: fields
    default_metadata: { type: policy }
  # Compliance
  compliance_controls:
    collection: compliance_controls
  compliance_relationships:
    collection: compliance_controls
  # Risk
  risk_controls:
    collection: domain_knowledge
    default_metadata: { type: risk_control }
  risk_entities:
    collection: entities
    default_metadata: { type: risk_entities }
  risk_evidence:
    collection: evidence
    default_metadata: { type: risk_evidence }
  risk_fields:
    collection: fields
    default_metadata: { type: risk_fields }
  # Domain / KB doc types (map to domain_knowledge with type)
  playbooks:
    collection: domain_knowledge
    default_metadata: { type: playbook }
  procedure_steps:
    collection: domain_knowledge
    default_metadata: { type: procedure }
  domain_knowledge:
    collection: domain_knowledge
  # Doc types as entities (same as doc_type_to_store)
  policy:
    collection: domain_knowledge
    default_metadata: { type: policy }
  playbook:
    collection: domain_knowledge
    default_metadata: { type: playbook }
  procedure:
    collection: domain_knowledge
    default_metadata: { type: procedure }
  framework:
    collection: domain_knowledge
    default_metadata: { type: framework }
  requirement:
    collection: domain_knowledge
    default_metadata: { type: requirement }
  guide:
    collection: domain_knowledge
    default_metadata: { type: guide }
  faq:
    collection: domain_knowledge
    default_metadata: { type: faq }
  advisory:
    collection: domain_knowledge
    default_metadata: { type: advisory }
  documentation:
    collection: domain_knowledge
    default_metadata: { type: documentation }
  product_docs:
    collection: domain_knowledge
    default_metadata: { type: product }
  standard:
    collection: compliance_controls
    default_metadata: { type: standard }
  control:
    collection: compliance_controls
    default_metadata: { type: control }
  exception:
    collection: entities
    default_metadata: { type: exception }
  rule_reference:
    collection: entities
    default_metadata: { type: rule_reference }
  # Product
  product_knowledge:
    collection: domain_knowledge
    default_metadata: { type: product }
  product_entities:
    collection: entities
    default_metadata: { type: product }
  product_descriptions:
    collection: domain_knowledge
    default_metadata: { type: product }
  # General stores (pass-through; retrieval uses metadata_filters from planner)
  entities:
    collection: entities
  evidence:
    collection: evidence
  fields:
    collection: fields
  controls:
    collection: controls
  # Schema / MDL (unprefixed in CollectionFactory)
  table_definitions:
    collection: table_definitions
  table_descriptions:
    collection: table_descriptions
  column_definitions:
    collection: column_definitions
  schema_descriptions:
    collection: schema_descriptions
  db_schema:
    collection: db_schema
  category_mapping:
    collection: category_mapping
  # Context graph (handled by ContextualGraphStorage; collection name for reference only)
  context_definitions:
    collection: context_definitions
  contextual_edges:
    collection: contextual_edges
  control_context_profiles:
    collection: control_context_profiles
  # Features
  features:
    collection: features
