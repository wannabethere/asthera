# HTTP server (optional redirect to HTTPS)
server {
    listen 80;
    server_name ec2-54-161-71-105.compute-1.amazonaws.com;

    return 301 https://$host$request_uri;
}

# HTTPS server with path-based routing
server {
    listen 443 ssl;
    server_name ec2-54-161-71-105.compute-1.amazonaws.com;

    ssl_certificate /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;

    # Route for main application (root path)
    location /sql/ {
        proxy_pass http://ec2-54-161-71-105.compute-1.amazonaws.com:8025;
        rewrite ^/sql/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route for unstructured service
    location /unstructured/ {
        proxy_pass http://ec2-54-161-71-105.compute-1.amazonaws.com:8080/;
        rewrite ^/unstructured/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route for analytics service
    location /dataservices/ {
        proxy_pass http://ec2-54-161-71-105.compute-1.amazonaws.com:8035/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route for analytics service
    location /analytics/ {
        proxy_pass http://ec2-54-161-71-105.compute-1.amazonaws.com:8018/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static file serving
    location /static/ {
        alias /var/www/static/;
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Handle common static file types
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Handle HTML files
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }
}