<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexy AI — Pipeline to Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/vega@5/build/vega.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5/build/vega-lite.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6/build/vega-embed.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0f1422;--surf2:#161d2e;--surf3:#1c253a;--surf4:#222d42;
  --border:#1e2840;--border2:#28344f;--text:#dde3f5;--muted:#58638a;--faint:#2a3555;
  --diag:#e8593c;--diag-bg:rgba(232,89,60,.08);
  --expl:#4da6ff;--expl-bg:rgba(77,166,255,.08);
  --pred:#f5a623;--pred-bg:rgba(245,166,35,.08);
  --oper:#2dd4a0;--oper-bg:rgba(45,212,160,.08);
  --alert:#f472b6;--alert-bg:rgba(244,114,182,.08);
  --s1:#9b8ef8;--s1-bg:rgba(155,142,248,.09);
  --s2:#f472b6;--s2-bg:rgba(244,114,182,.09);
  --s3:#f5a623;--s3-bg:rgba(245,166,35,.09);
  --s4:#2dd4a0;--s4-bg:rgba(45,212,160,.09);
  --ok:#2dd4a0;--warn:#f5a623;--bad:#e8593c;--info:#4da6ff;
  --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;--disp:'Syne',sans-serif;
}
html,body{height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.6}

/* ─── SHELL ─────────────────────────────────── */
.shell{display:grid;grid-template-columns:252px 472px 1fr;grid-template-rows:54px 1fr;height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.tb-brand{font-family:var(--disp);font-size:18px;font-weight:800;letter-spacing:-.4px}
.tb-brand em{color:var(--s1);font-style:normal}
.tb-sub{font-family:var(--mono);font-size:10px;color:var(--muted);padding-left:12px;border-left:1px solid var(--border2)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-pill{font-family:var(--disp);font-size:9px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:20px}
.tp-oper{background:var(--oper-bg);color:var(--oper);border:1px solid rgba(45,212,160,.2)}
.tp-diag{background:var(--diag-bg);color:var(--diag);border:1px solid rgba(232,89,60,.2)}

/* ─── SIDEBAR ────────────────────────────────── */
.sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;grid-row:2}
.sb-group-label{font-family:var(--disp);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:10px 14px 5px;display:flex;align-items:center;gap:7px}
.sb-group-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sb-group-label.diag{color:var(--diag)}.sb-group-label.expl{color:var(--expl)}.sb-group-label.pred{color:var(--pred)}.sb-group-label.oper{color:var(--oper)}.sb-group-label.alert-g{color:var(--alert)}
.conv-card{padding:9px 14px 9px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s;position:relative}
.conv-card:hover{background:var(--surf2)}
.conv-card.active{background:var(--surf2)}
.conv-card.active[data-q=diag]{border-left-color:var(--diag)}
.conv-card.active[data-q=expl]{border-left-color:var(--expl)}
.conv-card.active[data-q=pred]{border-left-color:var(--pred)}
.conv-card.active[data-q=oper]{border-left-color:var(--oper)}
.conv-card.active[data-q=alert-g]{border-left-color:var(--alert)}
.cc-intent{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.cc-intent.diag{color:var(--diag)}.cc-intent.expl{color:var(--expl)}.cc-intent.pred{color:var(--pred)}.cc-intent.oper{color:var(--oper)}.cc-intent.alert-g{color:var(--alert)}
.cc-q{font-size:11px;line-height:1.38;color:var(--text)}
.cc-meta{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.cc-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.cc-tag{font-family:var(--disp);font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}
.tag-fup{background:var(--alert-bg);color:var(--alert);border:1px solid rgba(244,114,182,.2)}
.tag-dash{background:var(--oper-bg);color:var(--oper);border:1px solid rgba(45,212,160,.2)}
.tag-alert{background:var(--diag-bg);color:var(--diag);border:1px solid rgba(232,89,60,.2)}
.tag-adhoc{background:var(--pred-bg);color:var(--pred);border:1px solid rgba(245,166,35,.2)}

/* ─── PIPELINE COLUMN ───────────────────────── */
.pipeline-col{grid-row:2;border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;display:flex;flex-direction:column}
.pipe-inner{padding:20px 22px 40px;flex:1}
.q-bubble-wrap{margin-bottom:20px}
.q-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.q-label::after{content:'';flex:1;height:1px;background:var(--border)}
.q-bubble{background:var(--surf2);border:1px solid var(--border2);border-radius:10px 10px 10px 0;padding:14px 16px;font-family:var(--disp);font-size:15px;font-weight:600;line-height:1.42;color:var(--text)}
.q-bubble.fup-q{border-color:rgba(244,114,182,.3);background:var(--alert-bg)}
.q-bubble.alert-q{border-color:rgba(232,89,60,.3);background:var(--diag-bg)}
.q-meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.q-chip{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;background:var(--surf3);border:1px solid var(--border2);color:var(--muted)}

/* Follow-up bypass callout */
.fup-callout{background:var(--alert-bg);border:1px solid rgba(244,114,182,.22);border-radius:9px;padding:11px 14px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.fup-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.fup-label{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--alert);margin-bottom:3px}
.fup-desc{font-size:11px;color:var(--text);line-height:1.45}
.fup-stats{display:flex;gap:12px;margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--alert);flex-wrap:wrap}
.fup-stats span::before{content:'· '}

/* Alert callout */
.alert-callout{background:var(--diag-bg);border:1px solid rgba(232,89,60,.3);border-radius:9px;padding:11px 14px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.alert-callout-icon{font-size:16px;flex-shrink:0}
.alert-callout-label{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--diag);margin-bottom:3px}
.alert-callout-desc{font-size:11px;color:var(--text);line-height:1.45}
.alert-meta-chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.amc{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(232,89,60,.1);color:var(--diag);border:1px solid rgba(232,89,60,.2)}

/* Pipeline stages */
.pipe-stages{display:flex;flex-direction:column;gap:0}
.pipe-stage{display:flex;gap:0;opacity:0;transform:translateY(8px)}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}
.pipe-stage.visible{animation:slideUp .32s ease forwards}
.ps-connector{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0}
.ps-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid var(--border2);background:var(--bg);transition:all .2s}
.ps-line{flex:1;width:1px;background:var(--border);min-height:12px}
.ps-dot.s1{border-color:var(--s1);background:rgba(155,142,248,.2);box-shadow:0 0 6px rgba(155,142,248,.3)}
.ps-dot.s2{border-color:var(--s2);background:rgba(244,114,182,.2);box-shadow:0 0 6px rgba(244,114,182,.3)}
.ps-dot.s3{border-color:var(--s3);background:rgba(245,166,35,.2);box-shadow:0 0 6px rgba(245,166,35,.3)}
.ps-dot.s4{border-color:var(--s4);background:rgba(45,212,160,.2);box-shadow:0 0 6px rgba(45,212,160,.3)}
.ps-dot.s5{border-color:var(--expl);background:rgba(77,166,255,.2);box-shadow:0 0 6px rgba(77,166,255,.3)}
.ps-dot.skip{border-color:var(--faint);background:var(--bg);box-shadow:none;opacity:.4}
.ps-body{flex:1;padding:0 0 20px 0}
.ps-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;user-select:none}
.ps-stage-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}
.sb-s1{background:var(--s1-bg);color:var(--s1);border:1px solid rgba(155,142,248,.25)}
.sb-s2{background:var(--s2-bg);color:var(--s2);border:1px solid rgba(244,114,182,.25)}
.sb-s3{background:var(--s3-bg);color:var(--s3);border:1px solid rgba(245,166,35,.25)}
.sb-s4{background:var(--s4-bg);color:var(--s4);border:1px solid rgba(45,212,160,.25)}
.sb-s5{background:var(--expl-bg);color:var(--expl);border:1px solid rgba(77,166,255,.25)}
.sb-skip{background:var(--surf3);color:var(--faint);border:1px solid var(--border)}
.ps-name{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--text)}
.ps-name.skip{color:var(--muted);text-decoration:line-through;opacity:.5}
.ps-toggle{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto}
.ps-content{overflow:hidden;transition:max-height .22s ease}
.ps-content.collapsed{max-height:0!important;overflow:hidden}

/* Stage 1 — Intent */
.intent-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surf3);border-radius:6px;margin-bottom:8px}
.intent-tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.it-diag{background:var(--diag-bg);color:var(--diag);border:1px solid rgba(232,89,60,.2)}
.it-expl{background:var(--expl-bg);color:var(--expl);border:1px solid rgba(77,166,255,.2)}
.it-pred{background:var(--pred-bg);color:var(--pred);border:1px solid rgba(245,166,35,.2)}
.it-oper{background:var(--oper-bg);color:var(--oper);border:1px solid rgba(45,212,160,.2)}
.it-alert{background:var(--alert-bg);color:var(--alert);border:1px solid rgba(244,114,182,.2)}
.conf-badge{font-family:var(--mono);font-size:10px;color:var(--ok)}
.routing-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;background:var(--surf4);color:var(--muted);border:1px solid var(--border2)}
.routing-badge.bypass{background:var(--alert-bg);color:var(--alert);border-color:rgba(244,114,182,.25)}
.signal-list{display:flex;flex-direction:column;gap:5px}
.signal-row{display:flex;align-items:flex-start;gap:8px;padding:6px 9px;background:var(--surf3);border-radius:5px}
.signal-key{font-family:var(--mono);font-size:9px;color:var(--s1);background:var(--s1-bg);border:1px solid rgba(155,142,248,.2);padding:1px 5px;border-radius:3px;flex-shrink:0;white-space:nowrap}
.signal-val{font-size:11px;color:var(--text);line-height:1.4}
.skipped-list{padding:7px 10px;background:var(--surf2);border-radius:5px;border:1px solid var(--border)}
.skipped-label{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px;letter-spacing:.06em}
.skipped-items{display:flex;gap:4px;flex-wrap:wrap}
.skip-chip{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;background:var(--surf3);color:var(--faint);border:1px solid var(--border);text-decoration:line-through}

/* Stage 2 — Concepts */
.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.concept-card{background:var(--surf3);border:1px solid var(--border);border-radius:8px;padding:10px;animation:slideUp .22s ease both}
.concept-card:nth-child(1){animation-delay:.04s}.concept-card:nth-child(2){animation-delay:.08s}.concept-card:nth-child(3){animation-delay:.12s}.concept-card:nth-child(4){animation-delay:.16s}
.cc-icon{font-size:16px;margin-bottom:5px}
.cc-cname{font-family:var(--disp);font-size:11px;font-weight:700;margin-bottom:2px}
.cc-cdesc{font-size:10px;color:var(--muted);line-height:1.38;margin-bottom:5px}
.cc-conf{display:flex;align-items:center;gap:6px}
.cc-bar{flex:1;height:3px;background:var(--surf4);border-radius:99px;overflow:hidden}
.cc-fill{height:100%;border-radius:99px;background:var(--s2)}
.cc-clbl{font-family:var(--mono);font-size:9px;color:var(--muted)}
.cc-ctags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.cctag{font-family:var(--mono);font-size:9px;padding:1px 4px;border-radius:2px;background:var(--surf4);color:var(--muted);border:1px solid var(--border2)}
.cctag.primary{background:var(--s2-bg);color:var(--s2);border-color:rgba(244,114,182,.25)}
.excl-list{margin-top:7px;display:flex;flex-direction:column;gap:4px}
.excl-item{display:flex;gap:6px;align-items:flex-start;padding:5px 8px;background:var(--surf2);border-radius:5px}
.excl-name{font-family:var(--mono);font-size:9px;color:var(--muted);text-decoration:line-through;flex-shrink:0}
.excl-reason{font-size:10px;color:var(--faint);line-height:1.35}

/* Stage 3 — Schemas */
.schema-area{background:var(--surf3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;animation:slideUp .22s ease both}
.schema-area:nth-child(1){animation-delay:.03s}.schema-area:nth-child(2){animation-delay:.07s}.schema-area:nth-child(3){animation-delay:.11s}.schema-area:nth-child(4){animation-delay:.15s}.schema-area:nth-child(5){animation-delay:.19s}.schema-area:nth-child(6){animation-delay:.23s}
.sa-hdr{display:flex;align-items:center;gap:8px;padding:8px 11px}
.sa-icon{font-size:13px;flex-shrink:0}.sa-name{font-family:var(--disp);font-size:11px;font-weight:700;flex:0 0 130px}
.sa-why{font-size:10px;color:var(--muted);line-height:1.35;flex:1}
.sa-status{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;flex-shrink:0}
.ss-ok{background:rgba(45,212,160,.1);color:var(--ok);border:1px solid rgba(45,212,160,.2)}
.ss-miss{background:rgba(232,89,60,.1);color:var(--bad);border:1px solid rgba(232,89,60,.2)}
.sa-tables{border-top:1px solid var(--border);padding:6px 11px;display:flex;gap:4px;flex-wrap:wrap}
.tbl-chip{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;display:flex;align-items:center;gap:3px}
.tbl-ok{background:rgba(45,212,160,.06);color:var(--ok);border:1px solid rgba(45,212,160,.14)}
.tbl-miss{background:rgba(232,89,60,.06);color:var(--bad);border:1px solid rgba(232,89,60,.14)}
.tbl-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}

/* Stage 4 — Agents */
.collider-warn{background:var(--s1-bg);border:1px solid rgba(155,142,248,.2);border-radius:6px;padding:8px 11px;margin-bottom:10px;display:flex;gap:7px;align-items:flex-start;font-size:10px;color:var(--muted)}
.cw-icon{color:var(--s1);flex-shrink:0;margin-top:1px}
.metric-row{display:grid;grid-template-columns:150px 1fr 70px;gap:8px;align-items:start;padding:7px 10px;background:var(--surf3);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;animation:slideUp .2s ease both}
.metric-row.blocked{opacity:.45;border-style:dashed}
.mn{font-family:var(--mono);font-size:9px;color:var(--expl);line-height:1.4}
.metric-row.blocked .mn{color:var(--muted);text-decoration:line-through}
.mw{font-size:10px;color:var(--text);line-height:1.35}
.metric-row.blocked .mw{color:var(--muted)}
.mrole{font-family:var(--disp);font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px;white-space:nowrap}
.r-T{background:var(--diag-bg);color:var(--diag);border:1px solid rgba(232,89,60,.2)}
.r-R{background:var(--pred-bg);color:var(--pred);border:1px solid rgba(245,166,35,.2)}
.r-M{background:var(--expl-bg);color:var(--expl);border:1px solid rgba(77,166,255,.2)}
.r-C{background:var(--s1-bg);color:var(--s1);border:1px solid rgba(155,142,248,.2)}
.agent-flow{display:flex;flex-direction:column;gap:0;margin-top:12px}
.agent-step{display:flex;gap:0}
.as-conn{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0}
.as-dot{width:8px;height:8px;border-radius:50%;background:var(--s4-bg);border:1.5px solid var(--s4);flex-shrink:0}
.as-dot.skip{background:var(--surf3);border-color:var(--faint);opacity:.35}
.as-line{flex:1;width:1px;background:var(--border);min-height:10px}
.as-body{flex:1;padding:0 0 14px 0}
.as-name{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--s4);margin-bottom:3px}
.as-name.skip{color:var(--faint);opacity:.4}
.as-narr{font-size:11px;color:var(--text);line-height:1.45;margin-bottom:4px}
.as-narr.skip{color:var(--faint);opacity:.4}
.as-detail{font-family:var(--mono);font-size:9px;color:var(--muted);background:var(--surf3);border:1px solid var(--border);border-radius:4px;padding:5px 8px;line-height:1.6;word-break:break-all}
.as-detail.skip{opacity:.25}
.shap-block{background:var(--surf3);border:1px solid var(--border);border-radius:8px;padding:11px;margin-top:10px}
.shap-title{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px}
.shap-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.shap-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);width:180px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shap-track{flex:1;height:4px;background:var(--surf4);border-radius:99px;overflow:hidden}
.shap-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--expl),var(--oper))}
.shap-val{font-family:var(--mono);font-size:9px;color:var(--text);width:36px;text-align:right;flex-shrink:0}
.causal-mini{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.causal-chip{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;display:flex;align-items:center;gap:4px}
.causal-chip.edge{background:var(--expl-bg);color:var(--expl);border:1px solid rgba(77,166,255,.2)}
.causal-chip.lead{background:var(--oper-bg);color:var(--oper);border:1px solid rgba(45,212,160,.2)}
.causal-chip.lag{background:var(--pred-bg);color:var(--pred);border:1px solid rgba(245,166,35,.2)}

/* ─── OUTPUT COLUMN ─────────────────────────── */
.output-col{grid-row:2;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;padding:20px 22px 40px;display:flex;flex-direction:column;gap:14px;position:relative}
.out-header{background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px}
.out-type-badge{font-family:var(--disp);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.otb-inline{background:var(--expl-bg);color:var(--expl);border:1px solid rgba(77,166,255,.2)}
.otb-dashboard{background:var(--oper-bg);color:var(--oper);border:1px solid rgba(45,212,160,.2)}
.otb-alert{background:var(--diag-bg);color:var(--diag);border:1px solid rgba(232,89,60,.2)}
.out-stage-label{font-family:var(--mono);font-size:10px;color:var(--muted)}
.out-persona{font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono);font-size:9px}

/* ═══════════════ QUAD META ═══════════════ */
const QMETA={
  diag:{color:"var(--diag)",cls:"diag",label:"Diagnostic"},
  expl:{color:"var(--expl)",cls:"expl",label:"Exploratory"},
  pred:{color:"var(--pred)",cls:"pred",label:"Predictive"},
  oper:{color:"var(--oper)",cls:"oper",label:"Operational"},
  "alert-g":{color:"var(--alert)",cls:"alert-g",label:"Alert"}
};

const STAGE_META=[
  {n:1,key:"s1",label:"Intent Classification",sub:"intent · confidence · routing"},
  {n:2,key:"s2",label:"Concept Mapping",sub:"domains · exclusions"},
  {n:3,key:"s3",label:"Schema Retrieval",sub:"tables · coverage"},
  {n:4,key:"s4",label:"Metric Resolution + Agents",sub:"dt_scored · causal · shapley"},
  {n:5,key:"s5",label:"Response Assembly",sub:"output type · stage 5"}
];

/* ═══════════════ STATE ═══════════════ */
let activeId=null;
let activeCharts={};

function clearCharts(){
  Object.values(activeCharts).forEach(v=>{try{v.finalize();}catch(e){}});
  activeCharts={};
}

/* ═══════════════ SIDEBAR ═══════════════ */
function renderSidebar(){
  const groups={};
  CONVS.forEach(c=>{
    if(!groups[c.group])groups[c.group]=[];
    groups[c.group].push(c);
  });
  const groupOrder=["Diagnostic","Exploratory","Predictive","Operational"];
  let html="";
  groupOrder.forEach(g=>{
    if(!groups[g])return;
    const qkey=groups[g][0].quadrant;
    html+=`<div class="sb-group-label ${qkey}">${g}</div>`;
    groups[g].forEach(c=>{
      const tags=[];
      if(c.is_followup)tags.push(`<span class="cc-tag tag-fup">follow-up</span>`);
      if(c.output_type==="dashboard")tags.push(`<span class="cc-tag tag-dash">dashboard</span>`);
      if(c.output_type==="alert")tags.push(`<span class="cc-tag tag-alert">alert</span>`);
      if(c.question_type==="adhoc_inline")tags.push(`<span class="cc-tag tag-adhoc">ad-hoc</span>`);
      html+=`<div class="conv-card" data-id="${c.id}" data-q="${c.quadrant}" onclick="selectConv('${c.id}')">
        <div class="cc-intent ${c.quadrant}">${c.intent}</div>
        <div class="cc-q">${c.question.length>90?c.question.substring(0,88)+'…':c.question}</div>
        <div class="cc-meta">${c.persona}</div>
        ${tags.length?`<div class="cc-tags">${tags.join("")}</div>`:""}
      </div>`;
    });
  });
  document.getElementById("sidebar").innerHTML=html;
}

/* ═══════════════ PIPELINE ═══════════════ */
function selectConv(id){
  clearCharts();
  const conv=CONVS.find(c=>c.id===id);
  if(!conv)return;
  activeId=id;
  document.querySelectorAll(".conv-card").forEach(el=>{
    el.classList.toggle("active",el.dataset.id===id);
  });
  renderPipeline(conv);
  setTimeout(()=>renderOutput(conv),60);
}

function renderPipeline(conv){
  const fupHtml=conv.is_followup&&conv.fup_callout?`
    <div class="fup-callout">
      <div class="fup-icon">⚡</div>
      <div>
        <div class="fup-label">${conv.fup_callout.label}</div>
        <div class="fup-desc">${conv.fup_callout.desc}</div>
        <div class="fup-stats">${conv.fup_callout.stats.map(s=>`<span>${s}</span>`).join("")}</div>
      </div>
    </div>`:
    conv.output_type==="alert"&&conv.alert_callout?`
    <div class="alert-callout">
      <div class="alert-callout-icon">🚨</div>
      <div>
        <div class="alert-callout-label">${conv.alert_callout.label}</div>
        <div class="alert-callout-desc">${conv.alert_callout.desc}</div>
        <div class="alert-meta-chips">${conv.alert_callout.chips.map(c=>`<span class="amc">${c}</span>`).join("")}</div>
      </div>
    </div>`:"";

  const qClass=conv.output_type==="alert"?"alert-q":conv.is_followup?"fup-q":"";

  let stagesHtml="";
  STAGE_META.forEach((sm,i)=>{
    const delay=(i+1)*120;
    let content="";
    if(sm.n===1){content=renderS1(conv);}
    else if(sm.n===2){content=conv.stage2?renderS2(conv):`<div style="font-size:10px;color:var(--muted);padding:6px 0;">Reused from parent conversation (${conv.parent_conversation_id||"—"})</div>`;}
    else if(sm.n===3){content=conv.stage3?renderS3(conv):`<div style="font-size:10px;color:var(--muted);padding:6px 0;">Schemas reused from conversation state.</div>`;}
    else if(sm.n===4){content=renderS4(conv);}
    else if(sm.n===5){content=`<div style="font-size:11px;color:var(--muted);padding:4px 0;">→ See <strong style="color:var(--text)">Dashboard Output</strong> panel on the right. Output type: <span style="color:var(--expl);font-family:var(--mono);font-size:10px">${conv.output_type}</span></div>`;}

    const isSkip=sm.n>=2&&conv.stage2===null&&sm.n<=4&&sm.n!==4;
    stagesHtml+=`
    <div class="pipe-stage" style="animation-delay:${delay}ms" id="ps${sm.n}_${conv.id}">
      <div class="ps-connector">
        <div class="ps-dot ${isSkip?"skip":sm.key}"></div>
        <div class="ps-line"></div>
      </div>
      <div class="ps-body">
        <div class="ps-header" onclick="toggleStage('pscontent${sm.n}_${conv.id}',this)">
          <span class="ps-stage-badge ${isSkip?"sb-skip":"sb-"+sm.key}">S${sm.n}</span>
          <span class="ps-name${isSkip?" skip":""}">${sm.label}</span>
          <span class="ps-toggle" id="pstoggle${sm.n}_${conv.id}">▾</span>
        </div>
        <div class="ps-content" id="pscontent${sm.n}_${conv.id}" style="max-height:2000px">
          ${content}
        </div>
      </div>
    </div>`;
  });

  document.getElementById("pipeline-inner").innerHTML=`
    <div class="q-bubble-wrap">
      <div class="q-label">User Question · Intent Classification</div>
      <div class="q-bubble ${qClass}">${conv.question}</div>
      <div class="q-meta-row">
        <span class="q-chip">persona: ${conv.persona.split("·")[0].trim()}</span>
        <span class="q-chip">turn: ${conv.is_followup?"follow-up":"1st"}</span>
        <span class="q-chip">output: ${conv.output_type}</span>
      </div>
    </div>
    ${fupHtml}
    <div class="pipe-stages" id="pipe-stages">${stagesHtml}</div>`;

  requestAnimationFrame(()=>{
    document.querySelectorAll(`[id^="ps"][id$="_${conv.id}"]`).forEach(el=>{
      el.classList.add("visible");
    });
  });
}

function toggleStage(contentId,hdrEl){
  const el=document.getElementById(contentId);
  if(!el)return;
  const collapsed=el.classList.contains("collapsed");
  el.classList.toggle("collapsed",!collapsed);
  const tog=hdrEl.querySelector(".ps-toggle");
  if(tog)tog.textContent=collapsed?"▾":"▸";
}

/* Stage 1 */
function renderS1(conv){
  const s=conv.stage1;
  const itClass=`it-${conv.quadrant==="alert-g"?"alert":conv.quadrant}`;
  const routeBypass=s.routing==="direct_dispatch"||s.routing==="short_circuit";
  const skippedHtml=s.skipped&&s.skipped.length?`
    <div class="skipped-list" style="margin-bottom:10px">
      <div class="skipped-label">BYPASSED:</div>
      <div class="skipped-items">${s.skipped.map(sk=>`<span class="skip-chip">${sk}</span>`).join("")}</div>
    </div>`:"";
  return `
    <div class="intent-row">
      <span class="intent-tag ${itClass}">${s.intent}</span>
      <span class="conf-badge">conf ${s.confidence}</span>
      <span class="routing-badge${routeBypass?" bypass":""}">${s.routing}</span>
    </div>
    ${skippedHtml}
    <div class="signal-list">${s.signals.map(sig=>`
      <div class="signal-row">
        <span class="signal-key">${sig.key}</span>
        <span class="signal-val">${sig.val}</span>
      </div>`).join("")}
    </div>`;
}

/* Stage 2 */
function renderS2(conv){
  if(!conv.stage2)return"";
  const concepts=conv.stage2.concepts.map(c=>`
    <div class="concept-card">
      <div class="cc-icon">${c.icon}</div>
      <div class="cc-cname">${c.name}</div>
      <div class="cc-cdesc">${c.desc}</div>
      <div class="cc-conf"><div class="cc-bar"><div class="cc-fill" style="width:${c.conf*100}%"></div></div><span class="cc-clbl">${c.conf}</span></div>
      <div class="cc-ctags">${c.tags.map(t=>`<span class="cctag${t==="primary"?" primary":""}">${t}</span>`).join("")}</div>
    </div>`).join("");
  const excl=conv.stage2.excluded&&conv.stage2.excluded.length?`
    <div style="margin-top:8px;font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px;letter-spacing:.06em">EXCLUDED</div>
    <div class="excl-list">${conv.stage2.excluded.map(e=>`
      <div class="excl-item">
        <span class="excl-name">${e.name}</span>
        <span class="excl-reason">${e.reason}</span>
      </div>`).join("")}
    </div>`:"";
  return `<div class="concept-grid">${concepts}</div>${excl}`;
}

/* Stage 3 */
function renderS3(conv){
  if(!conv.stage3)return"";
  return conv.stage3.areas.map(a=>{
    const isOk=a.status==="ok";
    return `<div class="schema-area">
      <div class="sa-hdr">
        <span class="sa-icon">${a.icon}</span>
        <span class="sa-name">${a.name}</span>
        <span class="sa-why">${a.why}</span>
        <span class="sa-status ${isOk?"ss-ok":"ss-miss"}">${a.status}</span>
      </div>
      <div class="sa-tables">${a.tables.map(t=>{
        const isMiss=t.includes("❌");
        return `<span class="tbl-chip ${isMiss?"tbl-miss":"tbl-ok"}"><span class="tbl-dot"></span>${t}</span>`;
      }).join("")}</div>
    </div>`;
  }).join("");
}

/* Stage 4 */
function renderS4(conv){
  const s=conv.stage4;
  const collider=s.collider?`
    <div class="collider-warn">
      <span class="cw-icon">⚠</span>
      <span>${s.collider}</span>
    </div>`:"";

  const metrics=s.metrics&&s.metrics.length?`
    <div style="margin-bottom:12px">
      ${s.metrics.map((m,i)=>`
      <div class="metric-row${m.blocked?" blocked":""}" style="animation-delay:${i*40}ms">
        <div class="mn">${m.name}</div>
        <div class="mw">${m.why}</div>
        <div class="mrole r-${m.role}">${{T:"Terminal",M:"Mediator",R:"Root",C:"Collider"}[m.role]}</div>
      </div>`).join("")}
    </div>`:"";

  const shapley=s.shapley&&s.shapley.length?`
    <div class="shap-block">
      <div class="shap-title">Shapley Attribution ϕ — Causal Drivers</div>
      ${s.shapley.map(sh=>`
      <div class="shap-row">
        <span class="shap-lbl">${sh.driver}</span>
        <div class="shap-track"><div class="shap-fill" style="width:${sh.phi*100}%"></div></div>
        <span class="shap-val">ϕ ${sh.phi}</span>
      </div>`).join("")}
    </div>`:"";

  const agents=`
    <div style="margin-top:10px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.07em;margin-bottom:7px;text-transform:uppercase">Agent Pipeline</div>
    <div class="agent-flow">
      ${s.agents.map((a,i)=>`
      <div class="agent-step">
        <div class="as-conn">
          <div class="as-dot${a.skip?" skip":""}"></div>
          ${i<s.agents.length-1?`<div class="as-line"></div>`:""}
        </div>
        <div class="as-body">
          <div class="as-name${a.skip?" skip":""}">${a.name}</div>
          ${!a.skip?`<div class="as-narr">${a.narr}</div>
          <div class="as-detail">${a.detail}</div>`:`<div class="as-narr skip" style="font-size:10px">— skipped —</div>`}
        </div>
      </div>`).join("")}
    </div>`;

  return collider+metrics+shapley+agents;
}

    <div class="out-section-hdr">Suggested Follow-ups</div>
    <div class="fup-suggestions">
      ${conv.suggestions.map(s=>`<div class="fup-sug">${s}</div>`).join("")}
    </div>`:"";

  col.innerHTML=`
    <div class="out-header">
      <span class="out-type-badge ${typeClass[conv.output_type]||"otb-inline"}">Stage 5 · ${outLabels[conv.output_type]||conv.output_type}</span>
      <span class="out-stage-label">${conv.intent}</span>
      <span class="out-persona">${conv.persona}</span>
    </div>
    ${alertBanner}
    ${dashBanner}
    ${kpiRow}
    ${summaryHtml}
    ${chartGrid}
    ${outcomesHtml}
    ${suggestHtml}`;

  if(conv.charts&&conv.charts.length){
    setTimeout(()=>renderCharts(conv),80);
  }
}

async function renderCharts(conv){
  if(!conv.charts)return;
  for(const c of conv.charts){
    const el=document.getElementById(c.id);
    if(!el)continue;
    const spec=c.spec();
    const w=el.parentElement?el.parentElement.clientWidth-22:280;
    if(spec.width==="container")spec.width=w>50?w-22:280;
    try{
      el.style.height="";
      const result=await vegaEmbed(`#${c.id}`,spec,{
        actions:false,renderer:"svg",
        config:VT
      });
      activeCharts[c.id]=result.view;
    }catch(e){
      el.innerHTML=`<div style="font-family:var(--mono);font-size:9px;color:var(--faint);padding:10px">Chart unavailable</div>`;
    }
  }
}

/* ═══════════════ INIT ═══════════════ */
renderSidebar();
selectConv("conv_001");
</script>
