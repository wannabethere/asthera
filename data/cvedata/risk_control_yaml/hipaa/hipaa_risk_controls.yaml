  name: Operation planning and control
  asset: operations_security
  trigger: needed
  loss_outcomes:
    - system unavailability
  controls: []
  description: |
    In a healthcare organization, the risk scenario of operation planning and control could materialize when critical operational systems, such as electronic health records (EHR) or patient management systems, become unavailable due to insufficient incident management protocols. This unavailability could occur through various attack vectors, including ransomware attacks that encrypt operational databases, rendering them inaccessible until a ransom is paid, or denial-of-service (DoS) attacks that flood the system with traffic, overwhelming its resources. Additionally, internal failures such as misconfigured security settings, software bugs, or inadequate backup procedures could lead to unplanned outages, exacerbating the situation.
    
    The business impact of such disruptions is significant; not only would patient care be compromised due to delays in accessing vital health information, but the organization could also face hefty fines for non-compliance with HIPAA regulations, which mandate the protection and availability of protected health information (PHI). Furthermore, the reputational damage from a breach or prolonged downtime could lead to a loss of patient trust and a decline in patient volume, ultimately affecting the organization's bottom line.
    
    The stakeholders affected by this risk scenario include healthcare providers, administrative staff, patients, and regulatory bodies. Operational systems that manage patient data, billing, and scheduling are critical assets that, if compromised, could lead to cascading failures across the healthcare delivery process. Real-world examples, such as the 2020 Universal Health Services ransomware attack, illustrate the severe consequences of operational disruptions, where the organization faced significant downtime and operational chaos, highlighting the urgent need for robust incident management and security protocols to mitigate such risks.
