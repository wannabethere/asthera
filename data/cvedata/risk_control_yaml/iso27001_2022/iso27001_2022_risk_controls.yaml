  scenario_id: ISO27001_2022-RISK-017
  name: Cabling security
  asset: physical_and_environmental_security
  trigger: a natural disaster or malicious attack
  loss_outcomes:
    - breach
  controls: []
  description: |
    In a risk scenario involving cabling security, a natural disaster such as a flood or earthquake, or a malicious attack like cable tampering or theft, could lead to a significant breach of sensitive data. For instance, if an organization’s network cabling is inadequately secured, floodwaters could damage critical infrastructure, leading to data loss or unauthorized access to systems. Similarly, an insider threat or an external attacker could physically access unsecured cabling, allowing them to intercept data transmissions or disrupt network services. 
    
    This scenario matters greatly because a breach resulting from compromised cabling can lead to severe business impacts, including operational downtime, loss of customer trust, and potential regulatory penalties for failing to protect sensitive information as mandated by compliance frameworks like ISO 27001:2022. The affected assets include not only the physical cabling infrastructure but also the connected systems and data repositories that rely on this network for functionality. Stakeholders impacted may include IT staff, management, and ultimately customers whose data may be exposed or lost.
    
    Real-world examples highlight the importance of cabling security; for instance, the 2017 Equifax breach was partially attributed to inadequate security measures, which could have included physical vulnerabilities in their infrastructure. Implementing best practices outlined in ISO 27001:2022, such as systematically mapping cable routes and ensuring physical protection against environmental threats, is crucial to mitigate these risks and safeguard the organization’s assets and reputation.
-
  scenario_id: ISO27001_2022-RISK-018
  name: Test information
  asset: software_development_and_acquisition
  trigger: control failure
  loss_outcomes:
    - breach
  controls: []
  description: |
    In a scenario where test information related to software development and acquisition is inadequately controlled, a breach could occur due to a failure in security measures designed to protect sensitive data. This could happen if developers inadvertently expose test environments containing real user data or proprietary algorithms to the internet without proper access controls, or if they fail to sanitize test data before using it in development. Attackers could exploit these vulnerabilities through methods such as SQL injection or unauthorized access to development servers, leading to the leakage of confidential information.
    
    The impact of such a breach is significant; it could result in financial losses due to regulatory fines, especially if the organization is subject to compliance frameworks like GDPR or HIPAA, which mandate strict data protection measures. Additionally, the reputational damage could undermine customer trust and lead to a loss of business, as clients may reconsider their partnerships with an organization that fails to secure sensitive information. Stakeholders affected include software developers, project managers, and ultimately, the end-users whose data may be compromised. 
    
    Real-world examples, such as the 2020 GitHub breach where sensitive data was exposed due to misconfigured repositories, highlight the importance of robust incident management and organizational controls as outlined in ISO 27001:2022. This incident serves as a cautionary tale for organizations to ensure that their development environments are secure and that they adhere to best practices in data handling to prevent similar breaches.
-
  scenario_id: ISO27001_2022-RISK-019
  name: Confidentiality or non-disclosure agreements
  asset: people_operations
  trigger: employee termination
  loss_outcomes:
    - breach
  controls: []
  description: |
    In the scenario of employee termination, a significant risk arises concerning the potential breach of confidentiality or non-disclosure agreements (NDAs) that employees have signed during their tenure. When an employee departs, especially if they are disgruntled or have access to sensitive information, they may intentionally or unintentionally disclose proprietary data, trade secrets, or client information. This could occur through various attack vectors, such as sharing information with competitors, leaking data online, or even taking physical documents or digital assets with them. 
    
    The implications of such a breach are severe; it can lead to loss of competitive advantage, legal ramifications, and damage to the organization's reputation. Additionally, non-compliance with industry regulations regarding data protection could result in hefty fines and increased scrutiny from regulatory bodies. The affected stakeholders include the organization itself, its employees, clients, and partners, all of whom rely on the integrity and confidentiality of the information being handled. 
    
    Real-world examples highlight the importance of robust NDA management; for instance, in 2020, a former employee of a tech company was charged with stealing proprietary algorithms and attempting to transfer them to a competitor, leading to a costly legal battle and significant reputational damage. This scenario underscores the necessity for organizations to implement stringent controls around NDAs, as outlined in ISO 27001:2022, ensuring that all agreements are regularly reviewed and enforced to mitigate the risk of information breaches during employee transitions.
-
  scenario_id: ISO27001_2022-RISK-020
  name: Privacy and protection of PII
  asset: privacy
  trigger: needed
  loss_outcomes:
    - operational impact
  controls: []
  description: |
    The risk scenario concerning the privacy and protection of Personally Identifiable Information (PII) could materialize when an organization fails to adequately secure sensitive customer data, leading to unauthorized access or data breaches. This could occur through various attack vectors such as phishing attacks, where employees inadvertently disclose login credentials, or through inadequate encryption protocols that allow hackers to intercept data during transmission. Additionally, failure modes may include misconfigured databases that expose PII to the public internet or insufficient access controls that enable unauthorized personnel to view sensitive information.
    
    The implications of such a breach are significant, as it not only jeopardizes the trust of customers and stakeholders but also exposes the organization to potential legal liabilities and regulatory fines under data protection laws like GDPR or CCPA. The operational impact could manifest in the form of costly remediation efforts, reputational damage, and loss of business opportunities, as customers may choose to take their business elsewhere due to concerns over data security. Stakeholders affected include customers whose data is compromised, employees who may face increased scrutiny or job loss, and the organization itself, which may suffer from diminished market value and increased insurance premiums.
    
    Real-world examples underscore the importance of robust PII protection; for instance, the 2017 Equifax breach, which exposed the personal information of approximately 147 million individuals, resulted in significant financial losses and a tarnished reputation for the company. Compliance with ISO 27001:2022 Annex A 5.34 is essential for organizations to systematically identify and protect PII, ensuring adherence to regulatory requirements and minimizing the risk of such damaging incidents.
