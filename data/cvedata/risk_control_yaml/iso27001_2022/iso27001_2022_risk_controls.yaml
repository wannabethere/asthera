  scenario_id: ISO27001_2022-RISK-014
  name: Cabling security
  asset: "\"access_control,_physical_and_environmental_security\""
  trigger: control failure
  loss_outcomes:
    - breach
  controls: []
  description: |
    In a scenario where cabling security is compromised due to a control failure, an attacker could gain unauthorized access to sensitive information by physically tapping into network cables or disrupting the integrity of the data transmission. This could occur through various attack vectors, such as exploiting poorly secured access points, utilizing social engineering to gain physical access to restricted areas, or bypassing inadequate surveillance measures. The implications of such a breach are significant; not only could it lead to the theft of confidential data, but it could also result in operational disruptions, regulatory fines for non-compliance with standards like ISO 27001:2022, and damage to the organization's reputation. Key assets affected include the physical and environmental security systems, network infrastructure, and sensitive data repositories, while stakeholders such as employees, customers, and partners may face increased risks to their personal and business information. Real-world examples, such as the 2020 attack on a major telecommunications provider where physical access to cabling led to a significant data breach, underscore the critical need for robust cabling security measures aligned with ISO 27001:2022 best practices to mitigate these risks effectively.
