  control_id: RSK-35
  name: General actions to address risks and opportunities
  description: |
    When planning for the information security management system, the organization shall consider the issues referred to in 4.1 and the requirements referred to in 4.2 and determine the risks and opportunities that need to be addressed to: a) ensure the information security management system can achieve its intended outcome(s); b) prevent, or reduce, undesired effects; c) achieve continual improvement. The organization shall plan: d) actions to address these risks and opportunities; and e) how to 1) integrate and implement the actions into its information security management system processes; and 2) evaluate the effectiveness of these actions domain: RISK_MANAGEMENT type: preventive framework_requirement: C.6.1.1 framework_mappings: iso27001_2022: C.6.1.1 nist_csf_2_0:
-
  control_id: RSK-36
  name: Information security risk assessment
  description: |
    The organization shall define and apply an information security risk assessment process that: a) establishes and maintains information security risk criteria that include: 1) the risk acceptance criteria; and 2) criteria for performing information security risk assessments; b) ensures that repeated information security risk assessments produce consistent, valid and comparable results; c) identifies the information security risks: 1) apply the information security risk assessment process to identify risks associated with the loss of confidentiality, integrity and availability for information within the scope of the information security management system; and 2) identify the risk owners; d) analyses the information security risks: 1) assess the potential consequences that would result if the risks identified in 6.1.2 c) 1) were to materialize; 2) assess the realistic likelihood of the occurrence of the risks identified in 6.1.2 c) 1); and 3) determine the levels of risk; e) evaluates the information security risks: 1) compare the results of risk analysis with the risk criteria established in 6.1.2 a); and 2) prioritize the analysed risks for risk treatment. The organization shall retain documented information about the information security risk assessment process. domain: RISK_MANAGEMENT type: detective framework_requirement: C.6.1.2 framework_mappings: iso27001_2022: C.6.1.2 nist_csf_2_0:
-
  control_id: RSK-37
  name: Information security risk treatment
  description: |
    The organization shall define and apply an information security risk treatment process to: a) select appropriate information security risk treatment options, taking account of the risk assessment results; b) determine all controls that are necessary to implement the information security risk treatment option(s) chosen; c) compare the controls determined in 6.1.3 b) above with those in Annex A and verify that no necessary controls have been omitted; d) produce a Statement of Applicability that contains: — the necessary controls (see 6.1.3 b) and c)); — justification for their inclusion; — whether the necessary controls are implemented or not; and — the justification for excluding any of the Annex A controls. e) formulate an information security risk treatment plan; and f) obtain risk owners’ approval of the information security risk treatment plan and acceptance of the residual information security risks. The organization shall retain documented information about the information security risk treatment process. domain: RISK_MANAGEMENT type: detective framework_requirement: C.6.1.3 framework_mappings: iso27001_2022: C.6.1.3 nist_csf_2_0:
-
  control_id: RSK-38
  name: Information security risk assessment
  description: |
    The organization shall perform information security risk assessments at planned intervals or when significant changes are proposed or occur, taking account of the criteria established in 6.1.2 a). The organization shall retain documented information of the results of the information security risk assessments. domain: RISK_MANAGEMENT type: detective framework_requirement: C.8.2 framework_mappings: iso27001_2022: C.8.2 nist_csf_2_0:
