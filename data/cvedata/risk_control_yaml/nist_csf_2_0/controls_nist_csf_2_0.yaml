  control_id: CM-7
  name: Least Functionality
  description: |
    The Least Functionality control aims to limit the capabilities of systems and applications to only those necessary for their intended function, thereby reducing the attack surface and minimizing potential vulnerabilities. This is crucial for mitigating risks associated with unauthorized access or exploitation of unnecessary features, which can lead to data breaches or system compromises. By adhering to this principle, organizations can ensure compliance with regulatory requirements and industry standards that mandate the minimization of risk exposure.
    
    To implement the Least Functionality control, organizations should conduct a thorough inventory of all systems and applications, identifying and documenting their essential functions. This should be followed by a risk assessment to determine which features are non-essential and can be disabled or removed. Regularly review and update configurations to ensure that only necessary services are running, and employ automated tools to enforce these configurations. Additionally, establish a process for evaluating new software or updates to ensure they align with the least functionality principle before deployment.
    
    Key components to consider include maintaining a baseline configuration for all systems, utilizing role-based access controls to limit user permissions, and implementing application whitelisting to restrict the execution of unauthorized software. Organizations should also consider integrating this control with broader security frameworks, such as the NIST Cybersecurity Framework, to enhance governance and risk management practices.
    
    To measure and monitor the effectiveness of the Least Functionality control, organizations should track metrics such as the number of unnecessary services disabled, the frequency of configuration reviews, and the incidence of unauthorized access attempts. Regular audits and vulnerability assessments can provide evidence of compliance and effectiveness, ensuring that systems remain aligned with the principle of least functionality. Adopting industry best practices, such as those outlined in the NIST CSF, can further strengthen the implementation and ongoing management of this control.
-
  control_id: CM-7(1)
  name: "\"\\\"Least Functionality | Periodic Review\\\"\""
  description: |
    The "Least Functionality | Periodic Review" control is designed to ensure that systems and applications are configured to provide only the essential functions necessary for their intended purpose. This minimizes the attack surface by restricting unnecessary services, ports, and protocols, thereby reducing the risk of exploitation and enhancing overall security posture. It is crucial for compliance with frameworks such as NIST CSF 2.0, as it directly supports risk management strategies by limiting potential vulnerabilities that could be exploited by malicious actors.
    
    To implement this control, organizations should first conduct a comprehensive inventory of all system functionalities and identify mission-essential capabilities. Regularly review and update configurations to prohibit or restrict non-essential functions, ensuring that only necessary services are enabled. Key components include maintaining an up-to-date list of allowed and disallowed functions, conducting periodic assessments to validate compliance with the least functionality principle, and ensuring that all personnel are trained on the importance of this control.
    
    Measurement and monitoring should focus on documenting changes to system configurations, tracking compliance with the established list of allowed functionalities, and conducting regular audits to identify any deviations. Metrics may include the number of unauthorized services detected, the frequency of configuration reviews, and the time taken to remediate identified issues. Adhering to industry best practices, such as those outlined in NIST SP 800-53 and other relevant guidelines, will further strengthen the effectiveness of this control.
-
