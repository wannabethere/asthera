  scenario_id: ISO27001_2013-RISK-017
  name: Clear desk and clear screen policy
  asset: physical_and_environmental_security
  trigger: a natural disaster or malicious attack
  loss_outcomes:
    - breach
  controls: []
  description: |
    In a scenario where a clear desk and clear screen policy is not strictly enforced, sensitive information could be left unattended on desks or screens, making it vulnerable to unauthorized access during a natural disaster, such as an earthquake or flood, or a malicious attack, like an insider threat or theft. For instance, if an employee leaves confidential client data visible on their screen or physical documents scattered on their desk, a passerby or an intruder could easily access this information during a chaotic event. The failure to adhere to this policy can lead to a significant data breach, exposing the organization to legal liabilities, regulatory fines, and reputational damage, particularly under frameworks like ISO 27001:2013 that emphasize the importance of information security management.
    
    The business impact is profound; not only could the organization face financial losses due to remediation costs and potential lawsuits, but it may also suffer from a loss of customer trust and market position. Stakeholders affected include employees who may face disciplinary actions, clients whose data is compromised, and the organization as a whole, which may experience operational disruptions and increased scrutiny from regulatory bodies. A real-world example is the case of a financial institution that faced severe penalties after a data breach occurred due to unprotected client information left on desks during a fire evacuation, highlighting the critical need for effective clear desk and clear screen policies in safeguarding sensitive data.
