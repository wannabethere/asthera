  scenario_id: ISO27001_2013-RISK-014
  name: Clear desk and clear screen policy
  asset: "\"access_control,_physical_and_environmental_security\""
  trigger: control failure
  loss_outcomes:
    - breach
  controls: []
  description: |
    The risk scenario of a Clear Desk and Clear Screen Policy failure poses a significant threat to an organization’s information security. In this scenario, sensitive documents, devices, or screens containing confidential data are left unattended or improperly secured in an employee's workspace. This could occur through negligence, such as an employee stepping away from their desk without locking their computer or securing sensitive paperwork, or through malicious intent, where an unauthorized individual gains access to the office environment, either physically or through social engineering tactics. 
    
    The implications of such a breach are severe; unauthorized access to sensitive information can lead to data theft, regulatory fines for non-compliance with data protection laws (such as GDPR or HIPAA), and reputational damage that can erode customer trust. Furthermore, the organization may face operational disruptions as it scrambles to mitigate the fallout from the breach, potentially leading to loss of business continuity. 
    
    Assets affected include physical documents, electronic devices, and the overall integrity of the organization’s information security management system, as outlined in ISO 27001:2013. Stakeholders such as employees, customers, and business partners could be impacted by the loss of sensitive information, leading to a cascade of negative consequences for the organization. Real-world examples, such as the 2017 Equifax data breach, highlight how lapses in basic security practices can lead to extensive data compromises, underscoring the critical need for stringent adherence to clear desk and clear screen policies.
-
  scenario_id: ISO27001_2013-RISK-015
  name: Protection of test data
  asset: software_development_and_acquisition
  trigger: control failure
  loss_outcomes:
    - breach
  controls: []
  description: |
    The risk scenario of inadequate protection of test data involves a situation where sensitive information, such as personally identifiable information (PII) or proprietary algorithms, is exposed due to control failures in the software development and acquisition process. This could occur through various attack vectors, such as unauthorized access to development environments, misconfigured databases, or inadequate encryption practices, allowing malicious actors to exploit vulnerabilities and extract sensitive test data. The implications of such a breach are significant; not only could it lead to regulatory penalties for non-compliance with data protection laws like GDPR or HIPAA, but it could also result in reputational damage, loss of customer trust, and financial losses due to remediation costs and potential lawsuits.
    
    The affected stakeholders would include software developers, project managers, and ultimately the end-users whose data is compromised, as well as the organization itself, which could face operational disruptions and increased scrutiny from regulatory bodies. For instance, in 2020, a major financial institution suffered a breach when test data containing customer information was inadvertently exposed due to poor access controls, leading to a substantial fine and loss of business. This scenario underscores the critical need for robust controls as outlined in ISO 27001:2013, specifically in Annex A.14.3, which emphasizes the careful collection, security, and review of test data to mitigate such risks effectively.
-
