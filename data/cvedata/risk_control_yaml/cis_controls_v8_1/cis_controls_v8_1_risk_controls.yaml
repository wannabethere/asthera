  scenario_id: CIS-RISK-011
  name: Remote working
  asset: communications_security
  trigger: improper segregation
  loss_outcomes:
    - breach
    - compliance violation
    - operational impact
  controls: []
  description: |
    The risk scenario of remote working, particularly due to improper segregation of duties, poses a significant threat to communications security within an organization. In this scenario, employees working remotely may inadvertently access sensitive information or systems without appropriate controls in place, leading to a potential data breach. This could occur through unsecured home networks, the use of personal devices lacking adequate security measures, or inadequate training on secure communication practices. For example, if an employee accesses confidential client data over an unsecured Wi-Fi connection, an attacker could intercept this data, leading to unauthorized access.
    
    The implications of such a breach are severe, as it not only compromises sensitive information but also results in compliance violations with regulations such as GDPR or HIPAA, which mandate stringent data protection measures. The operational impact could manifest as significant downtime, loss of customer trust, and potential financial penalties, all of which could disrupt business continuity. Stakeholders affected include employees, clients, and partners, as their data and trust in the organization are jeopardized. Real-world examples, such as the 2020 Twitter breach, highlight the vulnerabilities associated with remote work environments, where improper access controls led to high-profile account takeovers, underscoring the critical need for robust cybersecurity practices in remote settings.
