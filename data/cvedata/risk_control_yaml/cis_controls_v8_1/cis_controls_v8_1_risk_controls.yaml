  scenario_id: CIS-RISK-015
  name: Secure coding
  asset: software_development_and_acquisition
  trigger: control failure
  loss_outcomes:
    - breach
    - compliance violation
    - operational impact
  controls: []
  description: |
    In a scenario where secure coding practices are not adequately enforced during software development and acquisition, a significant risk arises from potential vulnerabilities being introduced into the codebase. This could occur through various attack vectors, such as inadequate code reviews, lack of automated security testing, or failure to adhere to established coding standards, leading to exploitable weaknesses like SQL injection or cross-site scripting. The implications of such a breach are severe; not only could sensitive customer data be compromised, resulting in reputational damage and loss of customer trust, but the organization may also face compliance violations under regulations such as GDPR or HIPAA, leading to hefty fines and legal repercussions.
    
    The operational impact could manifest as service disruptions, increased incident response costs, and resource allocation towards remediation efforts rather than innovation or growth initiatives. Key stakeholders affected include software developers, IT security teams, and ultimately, customers whose data is at risk. Real-world examples, such as the Capital One data breach in 2019, highlight the consequences of insecure coding practices, where a misconfigured web application firewall allowed an attacker to exploit vulnerabilities, compromising the personal information of over 100 million customers. This underscores the critical need for robust secure coding practices as outlined in the CIS Controls v8.1, which emphasize the importance of maintaining an accurate inventory of assets and implementing rigorous security measures throughout the software development lifecycle.
