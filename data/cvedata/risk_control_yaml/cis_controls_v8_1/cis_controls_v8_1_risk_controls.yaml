  scenario_id: CIS-RISK-019
  name: Responsibilities after termination or change of employment
  asset: information_security_operations
  trigger: control failure
  loss_outcomes:
    - breach
    - compliance violation
    - operational impact
  controls: []
  description: |
    In a scenario where an employee leaves the organization or changes roles, a failure to properly manage their access rights and responsibilities can lead to significant risks. For instance, if an employee retains access to sensitive systems or data post-termination, they could exploit this access to steal proprietary information or compromise sensitive data, resulting in a data breach. This could occur through various attack vectors, such as unauthorized access using retained credentials or exploiting unrevoked access tokens, which may remain active due to inadequate access management processes.
    
    The implications of such a breach are far-reaching; it could lead to severe compliance violations, particularly with regulations like GDPR or HIPAA, which mandate strict controls over data access and protection. The operational impact could manifest as disruptions in business processes, loss of customer trust, and potential financial penalties, all of which can severely damage the organization’s reputation and bottom line. Stakeholders affected include not only the IT and security teams responsible for managing access controls but also employees whose data may be compromised, customers whose trust is eroded, and the organization as a whole, which faces reputational and financial repercussions.
    
    Real-world examples underscore the importance of this risk scenario. In 2020, a former employee of a healthcare organization accessed patient records after termination, leading to a significant data breach that resulted in hefty fines and legal action. This incident highlights the critical need for organizations to enforce strict policies and controls around employee responsibilities after termination or role changes, as outlined in ISO 27002:2022 Control 6.5 and the CIS Controls v8.1, to mitigate such risks effectively.
