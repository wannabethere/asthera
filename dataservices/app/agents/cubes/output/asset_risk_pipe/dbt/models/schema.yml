version: 2

models:
metrics:
  - name: attack_surface_index_by_business_unit_metrics
    model: attack_surface_index_by_business_unit
    dimensions:
      - business_unit
    measures:
      - name: total_vulnerabilities
        expression: ${model.total_vulnerabilities}
      - name: total_misconfigurations
        expression: ${model.total_misconfigurations}
      - name: total_external_exposures
        expression: ${model.total_external_exposures}
      - name: total_identity_exposures
        expression: ${model.total_identity_exposures}

  - name: software_asset_management_summary_metrics
    model: software_asset_management_summary
    dimensions:
      - department
    measures:
      - name: total_software_assets
        expression: ${model.total_software_assets}
      - name: total_licenses
        expression: ${model.total_licenses}
      - name: avg_usage_hours
        expression: ${model.avg_usage_hours}

  - name: vulnerability_risk_assessment_metrics
    model: vulnerability_risk_assessment
    dimensions:
      - severity
    measures:
      - name: total_vulnerabilities
        expression: ${model.total_vulnerabilities}
      - name: avg_time_to_remediate
        expression: ${model.avg_time_to_remediate}

  - name: attack_surface_summary_by_os_software_metrics
    model: attack_surface_summary_by_os_software
    dimensions:
      - business_unit
      - environment
      - os
      - software_stack
    measures:
      - name: total_assets
        expression: ${model.total_assets}
      - name: total_vulnerabilities
        expression: ${model.total_vulnerabilities}
      - name: total_misconfigurations
        expression: ${model.total_misconfigurations}

  - name: external_exposure_summary_metrics
    model: external_exposure_summary
    dimensions:
      - business_unit
      - environment
      - exposure_type
    measures:
      - name: total_exposures
        expression: ${model.total_exposures}

  - name: identity_exposure_summary_metrics
    model: identity_exposure_summary
    dimensions:
      - business_unit
      - environment
      - identity_id
    measures:
      - name: total_identity_exposures
        expression: ${model.total_identity_exposures}
      - name: total_exposures
        expression: ${model.total_exposures}

  - name: asset_performance_trend_analysis_metrics
    model: asset_performance_trend_analysis
    dimensions:
      - asset_id
      - asset_name
      - asset_type
      - month
    measures:
      - name: total_vulnerabilities
        expression: ${model.total_vulnerabilities}
      - name: total_misconfigurations
        expression: ${model.total_misconfigurations}
      - name: total_external_exposures
        expression: ${model.total_external_exposures}
      - name: high_risk_vulnerability_ratio
        expression: ${model.high_risk_vulnerability_ratio}
      - name: critical_misconfiguration_ratio
        expression: ${model.critical_misconfiguration_ratio}

  - name: identity_exposure_risk_analysis_metrics
    model: identity_exposure_risk_analysis
    dimensions:
      - identity_id
      - month
    measures:
      - name: total_exposures
        expression: ${model.total_exposures}

  - name: software_inventory_compliance_analysis_metrics
    model: software_inventory_compliance_analysis
    dimensions:
      - software_id
      - software_name
      - month
    measures:
      - name: total_licenses
        expression: ${model.total_licenses}

  - name: asset_exposure_summary_metrics
    model: asset_exposure_summary
    dimensions:
      - asset_id
    measures:
      - name: total_vulnerabilities
        expression: ${model.total_vulnerabilities}
      - name: total_misconfigurations
        expression: ${model.total_misconfigurations}
      - name: total_external_exposures
        expression: ${model.total_external_exposures}

  - name: software_inventory_summary_metrics
    model: software_inventory_summary
    dimensions:
      - software_id
    measures:
      - name: total_licenses
        expression: ${model.total_licenses}
      - name: total_usage_hours
        expression: ${model.total_usage_hours}
