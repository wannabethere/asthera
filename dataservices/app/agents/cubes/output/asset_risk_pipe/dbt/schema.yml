version: 2

models:
  - name: attack_surface_index_by_business_unit
    description: "This mart contains the Attack Surface Index (ASI) by business unit, summarizing the total vulnerabilities, misconfigurations, external exposures, and identity exposures."
    columns:
      - name: business_unit
        description: "The business unit associated with the assets."
        tests:
          - not_null
      - name: total_vulnerabilities
        description: "The total number of distinct vulnerabilities associated with the assets in the business unit."
        tests:
          - not_null
      - name: total_misconfigurations
        description: "The total number of distinct misconfigurations associated with the assets in the business unit."
        tests:
          - not_null
      - name: total_external_exposures
        description: "The total number of distinct external exposures associated with the assets in the business unit."
        tests:
          - not_null
      - name: total_identity_exposures
        description: "The total number of distinct identity exposures associated with the assets in the business unit."
        tests:
          - not_null

  - name: software_asset_management_summary
    description: "This mart contains a summary of software assets by department, including total software assets, total licenses, and average usage hours."
    columns:
      - name: department
        description: "The department associated with the software assets."
        tests:
          - not_null
      - name: total_software_assets
        description: "The total number of distinct software assets in the department."
        tests:
          - not_null
      - name: total_licenses
        description: "The total number of licenses for software assets in the department."
        tests:
          - not_null
      - name: avg_usage_hours
        description: "The average usage hours of software assets in the department."
        tests:
          - not_null

  - name: vulnerability_risk_assessment
    description: "This mart contains a risk assessment of vulnerabilities based on their severity, including total vulnerabilities and average time to remediate."
    columns:
      - name: severity
        description: "The severity level of the vulnerabilities, which categorizes them into different risk levels."
        tests:
          - not_null
      - name: total_vulnerabilities
        description: "The total number of vulnerabilities recorded for each severity level."
        tests:
          - not_null
      - name: avg_time_to_remediate
        description: "The average time taken to remediate vulnerabilities, calculated by averaging the time_to_remediate values."
        tests:
          - not_null

  - name: attack_surface_summary_by_os_software
    description: "This mart contains a summary of the attack surface categorized by operating system, software stack, business unit, and environment."
    columns:
      - name: business_unit
        description: "The business unit responsible for the assets."
        tests:
          - not_null
      - name: environment
        description: "The environment in which the assets are deployed (e.g., production, staging)."
        tests:
          - not_null
      - name: os
        description: "The operating system of the assets."
        tests:
          - not_null
      - name: software_stack
        description: "The software stack associated with the assets."
        tests:
          - not_null
      - name: total_assets
        description: "The total number of distinct assets."
        tests:
          - not_null
      - name: total_vulnerabilities
        description: "The total number of distinct vulnerabilities associated with the assets."
        tests:
          - not_null
      - name: total_misconfigurations
        description: "The total number of distinct misconfigurations associated with the assets."
        tests:
          - not_null

  - name: external_exposure_summary
    description: "This mart summarizes external exposures categorized by business unit, environment, and type of exposure."
    columns:
      - name: business_unit
        description: "The business unit responsible for the exposure."
        tests:
          - not_null
      - name: environment
        description: "The environment in which the exposure is categorized (e.g., production, staging)."
        tests:
          - not_null
      - name: exposure_type
        description: "The type of exposure (e.g., vulnerability, misconfiguration)."
        tests:
          - not_null
      - name: total_exposures
        description: "The total number of distinct exposures recorded."
        tests:
          - not_null

  - name: identity_exposure_summary
    description: "This mart summarizes identity exposures by business unit and environment."
    columns:
      - name: business_unit
        description: "The business unit associated with the identity exposure."
        tests:
          - not_null
      - name: environment
        description: "The environment (e.g., production, staging) where the identity exposure occurred."
        tests:
          - not_null
      - name: total_identity_exposures
        description: "The total number of distinct identity exposures counted for each business unit and environment."
        tests:
          - not_null

  - name: asset_performance_trend_analysis
    description: "This mart contains a 12-month trend analysis of asset performance, including vulnerabilities, misconfigurations, and external exposures."
    columns:
      - name: asset_id
        description: "Unique identifier for each asset."
        tests:
          - not_null
      - name: asset_name
        description: "Name of the asset."
        tests:
          - not_null
      - name: asset_type
        description: "Type of the asset (e.g., server, application, etc.)."
        tests:
          - not_null
      - name: total_vulnerabilities
        description: "Total number of distinct vulnerabilities associated with the asset."
        tests:
          - not_null
      - name: total_misconfigurations
        description: "Total number of distinct misconfigurations associated with the asset."
        tests:
          - not_null
      - name: total_external_exposures
        description: "Total number of distinct external exposures associated with the asset."
        tests:
          - not_null
      - name: high_risk_vulnerability_ratio
        description: "Average ratio of high-risk vulnerabilities per asset."
        tests:
          - not_null
      - name: critical_misconfiguration_ratio
        description: "Average ratio of critical misconfigurations per asset."
        tests:
          - not_null

  - name: identity_exposure_risk_analysis
    description: "This mart contains a 12-month trend analysis of identity exposures, focusing on the number of exposures and their severity."
    columns:
      - name: identity_id
        description: "Unique identifier for each identity being analyzed."
        tests:
          - not_null
      - name: total_exposures
        description: "Total number of exposures recorded for each identity in the specified month."
        tests:
          - not_null
      - name: month
        description: "The month for which the exposure data is aggregated."
        tests:
          - not_null

  - name: software_inventory_compliance_analysis
    description: "This mart contains a 12-month trend analysis of software inventory compliance, focusing on the number of licenses and compliance status."
    columns:
      - name: software_id
        description: "Unique identifier for each software."
        tests:
          - not_null
      - name: software_name
        description: "Name of the software."
        tests:
          - not_null
      - name: total_licenses
        description: "Total number of licenses for each software."
        tests:
          - not_null
      - name: non_compliance_ratio
        description: "Ratio of non-compliant licenses to total licenses."
        tests:
          - not_null
      - name: month
        description: "The month for which the compliance data is reported."
        tests:
          - not_null

  - name: asset_exposure_summary
    description: "This mart aggregates exposure scores related to assets by counting vulnerabilities, misconfigurations, and external exposures."
    columns:
      - name: asset_id
        description: "Unique identifier for each asset."
        tests:
          - not_null
      - name: total_vulnerabilities
        description: "Total number of distinct vulnerabilities associated with the asset."
        tests:
          - not_null
      - name: total_misconfigurations
        description: "Total number of distinct misconfigurations associated with the asset."
        tests:
          - not_null
      - name: total_external_exposures
        description: "Total number of distinct external exposures associated with the asset."
        tests:
          - not_null

  - name: identity_exposure_summary
    description: "This mart summarizes the exposure of sensitive identity information by counting instances of exposure per identity."
    columns:
      - name: identity_id
        description: "Unique identifier for each identity whose exposure is being summarized."
        tests:
          - not_null
      - name: total_exposures
        description: "Total number of exposure instances recorded for each identity."
        tests:
          - not_null
      - name: exposure_score
        description: "Calculated score representing the number of exposures for an identity, used for dashboard visualizations."
        tests:
          - not_null

  - name: software_inventory_summary
    description: "This mart aggregates software inventory data by counting licenses and summing usage hours for each software."
    columns:
      - name: software_id
        description: "Unique identifier for each software in the inventory."
        tests:
          - not_null
      - name: total_licenses
        description: "Total number of licenses counted for each software."
        tests:
          - not_null
      - name: total_usage_hours
        description: "Total usage hours summed for each software."
        tests:
          - not_null
      - name: exposure_score
        description: "Calculated exposure score as total usage hours per license."
        tests:
          - not_null

metrics:
  - name: high_risk_exposure_ratio
    formula: "AVG(CASE WHEN severity = 'High' THEN 1.0 ELSE 0.0 END)"
    description: "The ratio of high-risk exposures to total exposures for each identity."
    mart_name: "identity_exposure_risk_analysis"

  - name: non_compliance_ratio
    formula: "AVG(CASE WHEN si.compliance_status = 'Non-Compliant' THEN 1.0 ELSE 0.0 END)"
    description: "Ratio of non-compliant licenses to total licenses."
    mart_name: "software_inventory_compliance_analysis"

  - name: exposure_score
    formula: "CASE WHEN COUNT(ie.exposure_id) > 0 THEN COUNT(ie.exposure_id) ELSE 0 END"
    description: "Calculated score representing the number of exposures for an identity, used for dashboard visualizations."
    mart_name: "identity_exposure_summary"

  - name: exposure_score
    formula: "SUM(COALESCE(si.usage_hours, 0)) / NULLIF(COUNT(si.license_id), 0)"
    description: "Calculated exposure score as total usage hours per license."
    mart_name: "software_inventory_summary"