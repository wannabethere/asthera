version: 2

models:
metrics:
  - name: learner_engagement_summary_metrics
    model: learner_engagement_summary
    dimensions:
      - user_id
      - registration_date
    measures:
      - name: total_courses_enrolled
        expression: ${model.total_courses_enrolled}
      - name: average_course_duration
        expression: ${model.average_course_duration}
      - name: total_courses_completed
        expression: ${model.total_courses_completed}

  - name: course_performance_summary_metrics
    model: course_performance_summary
    dimensions:
      - course_id
      - title
      - course_id
      - title
    measures:
      - name: total_enrollments
        expression: ${model.total_enrollments}
      - name: total_completions
        expression: ${model.total_completions}
      - name: average_completion_time
        expression: ${model.average_completion_time}
      - name: total_enrollments
        expression: ${model.total_enrollments}

  - name: user_acquisition_retention_analysis_metrics
    model: user_acquisition_retention_analysis
    dimensions:
      - user_id
    measures:
      - name: total_courses_enrolled
        expression: ${model.total_courses_enrolled}
      - name: enrollment_days
        expression: ${model.enrollment_days}

  - name: course_performance_metrics_metrics
    model: course_performance_metrics
    dimensions:
      - course_id
      - title
      - description
    measures:
      - name: total_enrollments
        expression: ${model.total_enrollments}
      - name: average_completion_rate
        expression: ${model.average_completion_rate}
      - name: total_duration
        expression: ${model.total_duration}

  - name: user_engagement_metrics_metrics
    model: user_engagement_metrics
    dimensions:
      - user_id
    measures:
      - name: total_courses_enrolled
        expression: ${model.total_courses_enrolled}
      - name: average_completion_rate
        expression: ${model.average_completion_rate}
      - name: total_time_spent
        expression: ${model.total_time_spent}

  - name: enrollment_trends_metrics
    model: enrollment_trends
    dimensions:
      - enrollment_date
    measures:
      - name: total_enrollments
        expression: ${model.total_enrollments}
      - name: total_courses_offered
        expression: ${model.total_courses_offered}

  - name: instructor_engagement_summary_metrics
    model: instructor_engagement_summary
    dimensions:
      - user_id
      - user_name
    measures:
      - name: total_courses_enrolled
        expression: ${model.total_courses_enrolled}
      - name: avg_course_duration
        expression: ${model.avg_course_duration}
      - name: total_courses_completed
        expression: ${model.total_courses_completed}

  - name: user_acquisition_retention_summary_metrics
    model: user_acquisition_retention_summary
    dimensions:
      - user_id
      - user_name
    measures:
      - name: total_courses_enrolled
        expression: ${model.total_courses_enrolled}
      - name: enrollment_days
        expression: ${model.enrollment_days}
      - name: total_courses_completed
        expression: ${model.total_courses_completed}
